<header class="header" [class.blue-nav]="isBlueNav">
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-logo">
        <a routerLink="/home">
          <img
            src="logo.png"
            alt="ICD GROUP Logo"
            style="height: 48px; width: auto; display: block"
          />
        </a>
      </div>
      <ul class="nav-menu" [class.active]="isMenuOpen()">
        <li class="nav-item">
          <a
            routerLink="/home"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            class="nav-link"
            (click)="closeMenu()"
            i18n="@@home"
            >Acasă</a
          >
        </li>
        <li class="nav-item">
          <a
            routerLink="about"
            routerLinkActive="active"
            class="nav-link"
            (click)="closeMenu()"
            i18n="@@about"
            >Despre Noi</a
          >
        </li>

        <!-- Dropdown -->
        <li
          class="nav-item dropdown"
          (mouseenter)="toggleDropdown()"
          (mouseleave)="closeDropdown()"
        >
          <a
            routerLink="energy-solutions"
            class="nav-link dropdown-toggle"
            (click)="closeMenu()"
            i18n="@@energySolutions"
          >
            Soluții Energetice
            <span class="arrow" [class.open]="isDropdownOpen()">▾</span>
          </a>
          <ul class="dropdown-menu" [class.open]="isDropdownOpen()">
            <li>
              <a
                routerLink="energy-solutions/proiect-ganeasa"
                class="dropdown-item"
                (click)="closeMenu()"
                i18n="@@proiectGaneasa"
              >
                Proiect Găneasa
              </a>
            </li>
            <li>
              <a
                routerLink="energy-solutions/anunturi"
                class="dropdown-item"
                (click)="closeMenu()"
                i18n="@@anunturi"
              >
                Anunțuri
              </a>
            </li>
          </ul>
        </li>

        <li class="nav-item">
          <a
            routerLink="portfolio"
            routerLinkActive="active"
            class="nav-link"
            (click)="closeMenu()"
            i18n="@@portfolio"
            >Portofoliu Imobiliar</a
          >
        </li>
        <li class="nav-item">
          <a
            routerLink="partnership"
            routerLinkActive="active"
            class="nav-link"
            (click)="closeMenu()"
            i18n="@@partnership"
            >Parteneriat</a
          >
        </li>
        <li class="nav-item">
          <a
            routerLink="contact"
            routerLinkActive="active"
            class="nav-link"
            (click)="closeMenu()"
            i18n="@@contact"
            >Contact</a
          >
        </li>
        <li class="nav-item">
          <button (click)="toggleLanguage()" [title]="getLanguageToggleTitle()">
            <img
              class="nav-button language-toggle"
              src="rouk1.png"
              alt="description"
            />
          </button>
        </li>
      </ul>
      <div class="hamburger" (click)="toggleMenu()">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </div>
    </div>
  </nav>
</header>
